table:
  name: finale_players_timelines
  schema: public
object_relationships:
  - name: player
    using:
      manual_configuration:
        column_mapping:
          id: id
        insertion_order: null
        remote_table:
          name: finale_players
          schema: public
select_permissions:
  - role: anonymous
    permission:
      columns:
        - timelines
        - id
        - nickname
      filter:
        player:
          private:
            _ne: true
    comment: ""
  - role: importer
    permission:
      columns:
        - timelines
        - id
        - nickname
      filter:
        player:
          _or:
            - user_id:
                _eq: X-Hasura-User-Id
            - private:
                _ne: true
    comment: ""
  - role: user
    permission:
      columns:
        - timelines
        - id
        - nickname
      filter:
        player:
          _or:
            - user_id:
                _eq: X-Hasura-User-Id
            - private:
                _ne: true
    comment: ""
